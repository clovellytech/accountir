<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accountir - Connect Bank</title>
    <script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            max-width: 480px;
            padding: 2rem;
        }
        h1 { font-size: 1.5rem; margin-bottom: 1rem; color: #fff; }
        .status {
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
            font-size: 0.95rem;
        }
        .loading { background: #16213e; border: 1px solid #0f3460; }
        .success { background: #1b4332; border: 1px solid #2d6a4f; color: #95d5b2; }
        .error { background: #3d0000; border: 1px solid #6b0000; color: #ff6b6b; }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #0f3460;
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .close-note { margin-top: 1.5rem; color: #888; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Accountir</h1>
        <div id="status" class="status loading">
            <span class="spinner"></span> Initializing Plaid Link...
        </div>
        <div id="close-note" class="close-note" style="display:none;">
            You can close this tab and return to the app.
        </div>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const closeNote = document.getElementById('close-note');

        function showStatus(cls, msg) {
            statusEl.className = 'status ' + cls;
            statusEl.innerHTML = msg;
        }

        async function init() {
            try {
                const resp = await fetch('/plaid/link-token', { method: 'POST' });
                if (!resp.ok) {
                    const err = await resp.json().catch(() => ({ error: 'Unknown error' }));
                    showStatus('error', 'Failed to get link token: ' + (err.error || resp.statusText));
                    return;
                }

                const { link_token } = await resp.json();

                const handler = Plaid.create({
                    token: link_token,
                    onSuccess: async (publicToken, metadata) => {
                        showStatus('loading', '<span class="spinner"></span> Connecting your bank...');
                        try {
                            const accounts = (metadata.accounts || []).map(a => ({
                                id: a.id,
                                name: a.name,
                                official_name: a.official_name || null,
                                type: a.type || a.subtype || 'depository',
                                mask: a.mask || null,
                            }));

                            const exchangeResp = await fetch('/plaid/exchange-token', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    public_token: publicToken,
                                    institution: {
                                        institution_id: metadata.institution?.institution_id || '',
                                        name: metadata.institution?.name || 'Unknown',
                                    },
                                    accounts: accounts,
                                }),
                            });

                            if (!exchangeResp.ok) {
                                const err = await exchangeResp.json().catch(() => ({}));
                                showStatus('error', 'Failed to save connection: ' + (err.error || 'Unknown error'));
                                return;
                            }

                            showStatus('success', 'Bank connected successfully!');
                            closeNote.style.display = 'block';
                        } catch (e) {
                            showStatus('error', 'Error: ' + e.message);
                        }
                    },
                    onExit: (err) => {
                        if (err) {
                            showStatus('error', 'Plaid Link exited: ' + (err.display_message || err.error_message || 'Cancelled'));
                        } else {
                            showStatus('loading', 'Cancelled. Reload to try again.');
                        }
                    },
                });

                handler.open();
            } catch (e) {
                showStatus('error', 'Failed to initialize: ' + e.message);
            }
        }

        init();
    </script>
</body>
</html>
