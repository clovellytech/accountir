name: Dev Build

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "build.rs"

permissions:
  contents: write

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  build:
    name: Build
    needs: ci
    uses: ./.github/workflows/build.yml
    with:
      ref_name: dev-${{ github.sha }}

  release:
    name: Create Dev Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum accountir-* > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create dev prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-${{ github.sha }}
          name: "Dev build ${{ github.sha }}"
          body: "Automated dev build from commit ${{ github.sha }}"
          prerelease: true
          files: |
            artifacts/accountir-*
            artifacts/checksums-sha256.txt
